name: ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  tests:
    name: tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Detect tests
        id: tests
        run: |
          set -euo pipefail
          if find . \
            -path './.git' -prune -o \
            -path './.venv' -prune -o \
            -path './venv' -prune -o \
            -type f \( -name 'test_*.py' -o -name '*_test.py' \) \
            -print -quit | grep -q .; then
            echo "found=true" >> "$GITHUB_OUTPUT"
          else
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        if: steps.tests.outputs.found == 'true'
        uses: actions/setup-python@v6.2.0
        with:
          python-version: "3.14"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install test dependencies
        if: steps.tests.outputs.found == 'true'
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt
          python -m pip install pytest

      - name: Run pytest
        if: steps.tests.outputs.found == 'true'
        run: python -m pytest -ra --junitxml=pytest-results.xml

      - name: Upload pytest results
        if: always() && steps.tests.outputs.found == 'true'
        uses: actions/upload-artifact@v7.0.1
        with:
          name: pytest-results
          path: pytest-results.xml
          if-no-files-found: error

      - name: Skip pytest
        if: steps.tests.outputs.found != 'true'
        run: echo "No pytest files found; skipping tests job."

  devops:
    name: devops checks
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.1.0

      - name: Set up Docker Compose
        uses: docker/setup-compose-action@v2.2.0
        with:
          version: v5.1.4

      - name: Check required files
        run: |
          set -euo pipefail
          test -f .env.example
          test -f .gitignore
          test -f .dockerignore
          test -f Dockerfile
          test -f docker-compose.yml
          test -f requirements.txt
          test -f README.md

      - name: Lint Python with Ruff
        uses: astral-sh/ruff-action@v4.0.0
        with:
          args: check --output-format=github .

      - name: Check Python formatting with Ruff
        uses: astral-sh/ruff-action@v4.0.0
        with:
          args: format --check .

      - name: Prepare local env for compose validation
        run: cp .env.example .env

      - name: Validate docker compose config
        run: docker compose config >/dev/null

      - name: Build bot image
        uses: docker/build-push-action@v7.2.0
        with:
          context: .
          file: ./Dockerfile
          pull: true
          push: false
          tags: anti-spam-telegram-bot:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Start redis
        run: docker compose up -d redis

      - name: Check redis health
        run: |
          set -euo pipefail
          for i in {1..30}; do
            if [ "$(docker compose exec -T redis redis-cli ping 2>/dev/null || true)" = "PONG" ]; then
              exit 0
            fi
            sleep 1
          done
          docker compose logs redis
          exit 1

      - name: Cleanup
        if: always()
        run: docker compose down -v --remove-orphans
